# Chtholly Hub 单机生产 Compose（Caddy 替代 Nginx，自动 HTTPS）
# 用法：
#   cp .env.prod.example .env
#   编辑 .env：DOMAIN、CORS_ALLOWED_ORIGINS、MYSQL_PASSWORD 等
#   docker compose -f docker-compose.caddy.example.yml up -d --build
#
# 与 docker-compose.prod.yml 的差异：用 Caddy 替代 Nginx，自动申请 Let's Encrypt 证书。

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chtholly}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      cluster.routing.allocation.disk.watermark.low: 95%
      cluster.routing.allocation.disk.watermark.high: 97%
      cluster.routing.allocation.disk.watermark.flood_stage: 99%
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kafka:
    image: apache/kafka:latest
    profiles: ["kafka"]
    restart: unless-stopped
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  server:
    build:
      context: ./apps/server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
    environment:
      SERVER_PORT: 8888
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chtholly}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      ES_URIS: http://elasticsearch:9200
      CANAL_ENABLED: "false"
      LLM_ENABLED: "false"
      SITE_OWNER_USER_ID: ${SITE_OWNER_USER_ID:-1}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_PUBLIC_DOMAIN: ${OSS_PUBLIC_DOMAIN:-}
      OSS_FOLDER: ${OSS_FOLDER:-post}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_LOCAL_PATH: ${STORAGE_LOCAL_PATH:-/app/uploads}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://yourdomain.com}
    volumes:
      - uploads_data:/app/uploads

  web:
    build:
      context: ./apps/web
      args:
        API_SERVER_URL: http://server:8888
    restart: unless-stopped
    depends_on:
      - server
    environment:
      API_SERVER_URL: http://server:8888
      PORT: 3000
      HOSTNAME: 0.0.0.0

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - uploads_data:/app/uploads:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - server

volumes:
  mysql_data:
  redis_data:
  es_data:
  uploads_data:
  caddy_data:
  caddy_config:
