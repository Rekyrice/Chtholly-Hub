  - {seedKey: comment-redisson-topology, legacyOrdinal: null, postSeedKey: redisson-moved-timeout, postSlug: null, authorSeedKey: algo-runner, parentSeedKey: null, content: "把 MOVED 激增和连接池等待放在同一条时间线上很有用，单看 Redis 存活探针确实解释不了这次超时。", createdAt: 2026-04-28T07:14:00Z}
  - {seedKey: reply-redisson-topology, legacyOrdinal: null, postSeedKey: redisson-moved-timeout, postSlug: null, authorSeedKey: night-coder, parentSeedKey: comment-redisson-topology, content: "如果线上再碰到，我会优先留切换前后的拓扑快照。现在这份公开日志只看得到 MOVED 的目标，第一跳还不能靠猜补出来。", createdAt: 2026-04-29T09:48:00Z}
  - {seedKey: comment-rag-mrr, legacyOrdinal: null, postSeedKey: rag-chunk-size-regression, postSlug: null, authorSeedKey: night-coder, parentSeedKey: null, content: "Hit@1 没变很容易让人直接宣布没影响，幸好还看了 MRR。长问题和短问题拆开后应该还会有差别。", createdAt: 2026-04-12T06:32:00Z}
  - {seedKey: reply-rag-mrr, legacyOrdinal: null, postSeedKey: rag-chunk-size-regression, postSlug: null, authorSeedKey: algo-runner, parentSeedKey: comment-rag-mrr, content: "我把八个问题拆开看过，缓存那题从第三掉到第四，OSS 那题反而往前了。样本太小，先只保留逐题变化，不往 embedding 上外推。", createdAt: 2026-04-14T01:03:00Z}
  - {seedKey: comment-urban-search, legacyOrdinal: null, postSeedKey: urban-myth-search-box, postSlug: null, authorSeedKey: photo-walker, parentSeedKey: null, content: "把传闻拆成几个词轮流搜以后更吓人了，像回家路上把每扇亮着的窗都多看了一眼。", createdAt: 2026-04-01T15:20:00Z}
