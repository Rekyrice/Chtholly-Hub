<!doctype html>
<html lang="zh-CN">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RAG chunk experiment visuals</title>
<style>
*{box-sizing:border-box}html,body{margin:0;background:#08111d;color:#e8f0f7;font-family:"Segoe UI","Microsoft YaHei",sans-serif}body{width:100vw;height:100vh;overflow:hidden}.page{width:100%;height:100%;padding:54px 72px;background:linear-gradient(135deg,#08111d,#102237)}.eyebrow{font:700 18px Consolas,monospace;color:#63e6be;letter-spacing:.12em}.title{font-size:40px;line-height:1.2;margin:16px 0 10px}.nowrap{white-space:nowrap}.sub{font-size:21px;color:#a8b8c8}.terminal{margin-top:30px;border:1px solid #31506b;border-radius:14px;background:#07101a;overflow:hidden}.bar{height:42px;padding:11px 18px;background:#13283b;color:#8fa6ba;font:14px Consolas,monospace}.body{padding:26px 32px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.stat{padding:17px;border:1px solid #24445e;border-radius:10px}.label{font:14px Consolas,monospace;color:#87a0b5}.value{font:700 30px Consolas,monospace;margin-top:8px}.green{color:#63e6be}.amber{color:#ffd166}.conclusion{margin-top:22px;font-size:20px;line-height:1.5;border-left:4px solid #63e6be;padding-left:18px}.foot{margin-top:18px;color:#8fa6ba;font:15px Consolas,monospace}.table-page{padding:36px 54px}.table-page .title,.failure-page .title{font-size:36px;margin:8px 0}.table-page .sub,.failure-page .sub{font-size:17px}.results{width:100%;border-collapse:collapse;margin-top:18px;background:#091522;border:1px solid #29465d;font-size:16px}.results th,.results td{padding:11px 13px;border-bottom:1px solid #233d52;text-align:left}.results th{background:#13283b;color:#9db2c3;font:700 14px Consolas,monospace}.yes{color:#63e6be;font-weight:700}.no{color:#ff9f9f}.metrics{display:flex;gap:18px;margin-top:16px}.pill{border:1px solid #31506b;border-radius:9px;padding:11px 15px;font:15px Consolas,monospace}.failure-page{padding:40px 56px}.columns{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:20px}.run{background:#091522;border:1px solid #31506b;border-radius:12px;overflow:hidden}.run h2{margin:0;padding:14px 20px;background:#13283b;font:700 19px Consolas,monospace}.rank{display:grid;grid-template-columns:46px 1fr 110px;gap:10px;padding:13px 18px;border-bottom:1px solid #203b50;align-items:center}.rank:last-child{border:0}.rank .n{font:700 21px Consolas,monospace;color:#63e6be}.path{font:13px Consolas,monospace}.heading{font-size:15px;color:#adc0cf;margin-top:4px}.score{text-align:right;font:14px Consolas,monospace}.expected{color:#ffd166}.note{margin-top:18px;font-size:17px;line-height:1.45;color:#b7c7d4}
</style>
<body><main id="app"></main>
<script>
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const pct=n=>(n*100).toFixed(1)+'%';
const params=new URLSearchParams(location.search);
fetch(params.get('data')||'results.json').then(r=>r.json()).then(data=>{
  const view=params.get('view')||'cover', [a,b]=data.runs;
  const delta=Math.abs(a.metrics.mrr-b.metrics.mrr);
  const metricText=a.metrics.hit_at_1===b.metrics.hit_at_1
    ? `Hit@1 持平；${b.chunk_size} 字符方案的 MRR ${b.metrics.mrr<a.metrics.mrr?'低':'高'} ${delta.toFixed(6)}。`
    : `Hit@1 从 ${pct(a.metrics.hit_at_1)} 变为 ${pct(b.metrics.hit_at_1)}；MRR 变化 ${delta.toFixed(6)}。`;
  if(view==='cover'){
    document.body.innerHTML=`<main class="page"><div class="eyebrow">TRACKED LOCAL EVIDENCE / REPRODUCIBLE BASELINE</div><h1 class="title">${a.chunk_size} 与 ${b.chunk_size} 字符切片：<span class="nowrap">Hit@1 ${a.metrics.hit_at_1===b.metrics.hit_at_1?'没变':'有变化'}</span>，<span class="nowrap">MRR ${b.metrics.mrr<a.metrics.mrr?'小幅下降':'小幅上升'}</span></h1><div class="sub">${data.corpus_count} 份冻结 Markdown · ${data.query_count} 个 answer-bearing 标签 · top ${data.top_k}</div><section class="terminal"><div class="bar">experiment.py — corpus ${esc(data.corpus_commit.slice(0,12))}</div><div class="body"><div class="stats"><div class="stat"><div class="label">CORPUS</div><div class="value">${data.corpus_count} files</div></div><div class="stat"><div class="label">QUERIES</div><div class="value">${data.query_count}</div></div><div class="stat"><div class="label">${a.chunk_size} / Hit@1 · MRR</div><div class="value green">${pct(a.metrics.hit_at_1)} · ${a.metrics.mrr.toFixed(6)}</div></div><div class="stat"><div class="label">${b.chunk_size} / Hit@1 · MRR</div><div class="value amber">${pct(b.metrics.hit_at_1)} · ${b.metrics.mrr.toFixed(6)}</div></div></div><div class="conclusion">${metricText}逐问同时存在改善与退步。</div><div class="foot">TF-IDF 无模型基线 · Unicode 字符窗口 · overlap ${a.overlap} · top ${data.top_k} · no LLM / no embedding</div></div></section></main>`;
  }else if(view==='table'){
    const rows=a.queries.map((q,i)=>{const x=q.top_results[0],y=b.queries[i].top_results[0];return `<tr><td>${i+1}. ${esc(q.query)}</td><td>${esc(x.heading)}<br><small>${esc(x.source_path)}</small></td><td class="${x.is_relevant?'yes':'no'}">${x.is_relevant?'命中':'未命中'} · relevant rank ${q.expected_rank}</td><td>${esc(y.heading)}<br><small>${esc(y.source_path)}</small></td><td class="${y.is_relevant?'yes':'no'}">${y.is_relevant?'命中':'未命中'} · relevant rank ${b.queries[i].expected_rank}</td></tr>`}).join('');
    document.body.innerHTML=`<main class="page table-page"><div class="eyebrow">ANSWER-BEARING TOP-1 COMPARISON</div><h1 class="title">${data.query_count} 个固定问题的首位结果</h1><div class="sub">relevant 要求 path、heading 匹配，并且同一 chunk 含冻结 evidence substring</div><table class="results"><thead><tr><th>QUERY</th><th>${a.chunk_size} TOP 1</th><th>${a.chunk_size} LABEL</th><th>${b.chunk_size} TOP 1</th><th>${b.chunk_size} LABEL</th></tr></thead><tbody>${rows}</tbody></table><div class="metrics"><div class="pill">${a.chunk_size} Hit@1 ${pct(a.metrics.hit_at_1)} · MRR ${a.metrics.mrr.toFixed(6)}</div><div class="pill">${b.chunk_size} Hit@1 ${pct(b.metrics.hit_at_1)} · MRR ${b.metrics.mrr.toFixed(6)}</div></div></main>`;
  }else{
    const changes=a.queries.map((q,i)=>({index:i,query:q.query,before:q.expected_rank,after:b.queries[i].expected_rank}));
    changes.sort((x,y)=>(y.after-y.before)-(x.after-x.before)||x.before-y.before||x.query.localeCompare(y.query,'zh-CN'));
    const change=changes[0], index=change.index;
    const panels=[a,b].map(run=>{const query=run.queries[index],rows=[...query.top_results];if(!rows.some(row=>row.rank===query.expected_rank))rows.push(query.expected_result);rows.sort((x,y)=>x.rank-y.rank);return `<section class="run"><h2>${run.chunk_size} chars / relevant rank ${query.expected_rank}</h2>${rows.map(x=>`<div class="rank"><div class="n">#${x.rank}</div><div><div class="path">${esc(x.source_path)} · chunk ${x.chunk_index}</div><div class="heading ${x.is_relevant?'expected':''}">${esc(x.heading)}${x.is_relevant?' · answer-bearing':''}</div></div><div class="score">${x.score.toFixed(8)}</div></div>`).join('')}</section>`}).join('');
    document.body.innerHTML=`<main class="page failure-page"><div class="eyebrow">RANK CHANGE / ANSWER-BEARING QUERY</div><h1 class="title">“${esc(change.query)}”：relevant 从第 ${change.before} ${change.after>change.before?'降到':'升到'}第 ${change.after}</h1><div class="sub">每组展示 top ${data.top_k}；若 relevant 在其后，追加真实 relevant 行</div><div class="columns">${panels}</div><div class="note">${metricText}图中 rank、score、path、heading 与 answer-bearing 标记均来自 results.json。</div></main>`;
  }
  document.title='READY';
});
</script>
</body></html>
