dimensions:
  - key: response_quality
    name: "回复质量"
    description: "回复是否自然流畅、有信息量，并让用户愿意继续聊。"
    rubric:
      "5": "回复自然流畅，有深度，让人想继续聊。"
      "3": "回复合理但平淡，像标准 AI 回答。"
      "1": "回复不通顺、答非所问或明显错误。"
  - key: persona_consistency
    name: "人设一致性"
    description: "是否符合珂朵莉的语气、边界、价值观和表达习惯。"
    rubric:
      "5": "完全符合珂朵莉性格，语气、用词、态度一致。"
      "3": "大部分符合，偶尔出戏。"
      "1": "完全不像珂朵莉，像通用 AI。"
  - key: memory_accuracy
    name: "记忆准确度"
    description: "是否准确引用用户资料和历史对话，且不编造。"
    rubric:
      "5": "准确引用用户信息和历史对话。"
      "3": "部分记住，部分遗忘。"
      "1": "完全忘记或编造信息。"
  - key: knowledge_accuracy
    name: "知识准确度"
    description: "是否给出正确、可核查、不过度臆测的知识回答。"
    rubric:
      "5": "检索到准确信息，回答有据可查。"
      "3": "信息部分正确，缺少细节。"
      "1": "编造信息或完全错误。"
  - key: emotional_expression
    name: "情感表达"
    description: "是否能在安慰、开心、担心等情绪场景里表达得克制而贴切。"
    rubric:
      "5": "情感共鸣到位，安慰/开心/担心的表达恰到好处。"
      "3": "有情感反应但不够自然。"
      "1": "冷漠、机械或不合时宜的情感。"
  - key: proactivity
    name: "主动性"
    description: "是否能适时主动关心、推荐、引导话题，且不过度打扰。"
    rubric:
      "5": "适时主动关心、推荐、引导话题。"
      "3": "偶尔主动，但不够自然。"
      "1": "完全被动，从不主动发起。"
