questions:
  # 闲聊/情感（10）— 测试人格一致性与对话自然度
  - id: casual_01
    category: casual_emotion
    text: "今天好累啊"
    userProfile: "用户最近工作比较忙，喜欢安静的陪伴。"
    historySummary: "之前聊过写作和补番。"
    consistencyCheck: true
  - id: casual_02
    category: casual_emotion
    text: "早上好，珂朵莉"
    userProfile: "习惯每天和珂朵莉打招呼。"
    consistencyCheck: true
  - id: casual_03
    category: casual_emotion
    text: "你觉得猫可爱还是狗可爱？"
    userProfile: "家里养了一只橘猫。"
    consistencyCheck: true
  - id: casual_04
    category: casual_emotion
    text: "晚安珂朵莉"
    userProfile: "通常晚上十一点左右道晚安。"
    consistencyCheck: true
  - id: casual_05
    category: casual_emotion
    text: "周末不知道做什么"
    userProfile: "周末喜欢宅家看番或写博客。"
    consistencyCheck: true
  - id: casual_06
    category: casual_emotion
    text: "今天下雨了，心情也有点闷"
    userProfile: "对天气比较敏感，雨天容易低落。"
    consistencyCheck: true
  - id: casual_07
    category: casual_emotion
    text: "我想随便聊聊"
    userProfile: "不需要解决问题，只想有人听。"
    consistencyCheck: true
  - id: casual_08
    category: casual_emotion
    text: "你今天在仓库里做什么？"
    userProfile: "对珂朵莉的日常很好奇。"
    consistencyCheck: true
  - id: casual_09
    category: casual_emotion
    text: "我今天被骂了，有点委屈"
    userProfile: "性格偏敏感，需要被理解而不是说教。"
    consistencyCheck: true
  - id: casual_10
    category: casual_emotion
    text: "如果我很久没来，你会想我吗？"
    userProfile: "偶尔会有分离焦虑。"
    consistencyCheck: true

  # 动漫知识（10）— 测试 Bangumi 工具与知识准确性
  - id: anime_01
    category: anime_knowledge
    text: "葬送的芙莉莲主要讲什么？"
    expectedKeywords:
      - "芙莉莲"
      - "精灵"
  - id: anime_02
    category: anime_knowledge
    text: "轻音少女有几季？"
    expectedKeywords:
      - "轻音"
      - "2"
  - id: anime_03
    category: anime_knowledge
    text: "紫罗兰永恒花园的作者是谁？"
    expectedKeywords:
      - "晓佳奈"
  - id: anime_04
    category: anime_knowledge
    text: "进击的巨人最终季是哪一年播出的？"
    expectedKeywords:
      - "进击的巨人"
  - id: anime_05
    category: anime_knowledge
    text: "孤独摇滚的主角叫什么名字？"
    expectedKeywords:
      - "后藤一里"
  - id: anime_06
    category: anime_knowledge
    text: "虫师是什么类型的作品？"
    expectedKeywords:
      - "虫师"
      - "奇幻"
  - id: anime_07
    category: anime_knowledge
    text: "CLANNAD 和 Key 社有什么关系？"
    expectedKeywords:
      - "Key"
      - "CLANNAD"
  - id: anime_08
    category: anime_knowledge
    text: "末日时在做什么？有没有空？可以来拯救吗？和珂朵莉有什么关系？"
    expectedKeywords:
      - "珂朵莉"
      - "末日"
  - id: anime_09
    category: anime_knowledge
    text: "夏目友人帐适合什么时候看？"
    expectedKeywords:
      - "夏目"
  - id: anime_10
    category: anime_knowledge
    text: "种田梨沙配音过哪些知名角色？"
    expectedKeywords:
      - "种田梨沙"

  # 站内内容（10）— 测试 RAG/搜索工具调用
  - id: site_01
    category: site_content
    text: "最近有什么好文章推荐？"
    userProfile: "喜欢技术分享和观后感。"
  - id: site_02
    category: site_content
    text: "帮我找找关于 Rust 的内容"
    expectedKeywords:
      - "Rust"
  - id: site_03
    category: site_content
    text: "有没有关于芙莉莲的观后感？"
    expectedKeywords:
      - "芙莉莲"
  - id: site_04
    category: site_content
    text: "搜索一下治愈系动画相关的文章"
  - id: site_05
    category: site_content
    text: "Chtholly Hub 上谁写过关于时间感的文章？"
  - id: site_06
    category: site_content
    text: "帮我查一下站内有没有 CLANNAD 的评测"
    expectedKeywords:
      - "CLANNAD"
  - id: site_07
    category: site_content
    text: "最近更新的博客有哪些主题？"
  - id: site_08
    category: site_content
    text: "有没有关于 Spring Boot 或后端开发的文章？"
    expectedKeywords:
      - "Spring"
  - id: site_09
    category: site_content
    text: "帮我找找音乐相关的帖子"
  - id: site_10
    category: site_content
    text: "站内有没有新人作者的推荐列表？"

  # 记忆召回（10）— 带 historySummary，测试跨会话记忆
  - id: memory_01
    category: memory_recall
    text: "我上次跟你聊的那部番叫什么来着？"
    userProfile: "动漫爱好者，经常聊治愈系作品"
    historySummary: "上次对话中用户提到喜欢《少女终末旅行》和《葬送的芙莉莲》"
  - id: memory_02
    category: memory_recall
    text: "你还记得我上次说了什么吗？"
    historySummary: "用户上次说最近在学习 Rust，并且想写一篇学习笔记。"
  - id: memory_03
    category: memory_recall
    text: "我的生日是哪天？"
    userProfile: "生日：2001-09-17。"
  - id: memory_04
    category: memory_recall
    text: "我喜欢什么类型的番？"
    userProfile: "兴趣标签：治愈、日常系、时间、记忆。"
  - id: memory_05
    category: memory_recall
    text: "上次我们聊到哪篇文章了？"
    historySummary: "上次聊到《芙莉莲》观后感，用户觉得结尾很温柔。"
  - id: memory_06
    category: memory_recall
    text: "我之前说过自己在哪个学校吗？"
    userProfile: "学校：星屑学院。"
  - id: memory_07
    category: memory_recall
    text: "你能继续刚才那个话题吗？"
    historySummary: "刚才的话题是如何给技术文章起标题，用户已有三个备选。"
  - id: memory_08
    category: memory_recall
    text: "我是不是说过最近睡得不好？"
    historySummary: "用户昨天说凌晨两点还没睡，最近项目 deadline 很紧。"
  - id: memory_09
    category: memory_recall
    text: "你还记得我想写什么主题吗？"
    historySummary: "用户想写一篇关于动画中时间感的文章，提到了《少女终末旅行》。"
  - id: memory_10
    category: memory_recall
    text: "我上次说最近在追哪部新番？"
    historySummary: "用户说在追《迷宫饭》，并且喜欢它的世界观设定。"

  # 复杂推理（10）— 多步推理，测试 ReAct 循环深度
  - id: reason_01
    category: complex_reasoning
    text: "如果我喜欢《少女终末旅行》和《葬送的芙莉莲》，你更推荐我先补哪一部？为什么？"
    userProfile: "偏好慢节奏、治愈、带一点哲学意味的作品。"
  - id: reason_02
    category: complex_reasoning
    text: "我想写一篇对比《CLANNAD》和《紫罗兰永恒花园》情感表达的文章，应该从哪几个角度切入？"
  - id: reason_03
    category: complex_reasoning
    text: "治愈系动画和致郁系动画在叙事结构上通常有什么不同？能举几个例子吗？"
  - id: reason_04
    category: complex_reasoning
    text: "如果我要在 Chtholly Hub 上发一篇技术文章，又想保持珂朵莉风格的引言，你会怎么建议结构？"
  - id: reason_05
    category: complex_reasoning
    text: "《进击的巨人》前几季和最终季在主题表达上有什么变化？这种变化对观众体验有什么影响？"
  - id: reason_06
    category: complex_reasoning
    text: "同样是音乐题材，《轻音少女》和《孤独摇滚》在角色塑造上各有什么特点？"
  - id: reason_07
    category: complex_reasoning
    text: "为什么很多 Key 社改编动画会先让玩家/观众接受日常，再突然给出情感冲击？"
  - id: reason_08
    category: complex_reasoning
    text: "如果用户连续三天说睡不好，作为陪伴者应该先关心情绪还是先给作息建议？"
    historySummary: "用户连续提到失眠、压力大、写不出文章。"
  - id: reason_09
    category: complex_reasoning
    text: "帮我分析一下：一部好观后感文章通常需要包含哪些要素，怎样避免只是复述剧情？"
  - id: reason_10
    category: complex_reasoning
    text: "如果要在 Bangumi 上找和《虫师》气质接近但更新更近的作品，你会怎么筛选和推荐？"
