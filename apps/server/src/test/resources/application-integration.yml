spring:
  sql:
    init:
      mode: always
      schema-locations: file:db/schema.sql
  kafka:
    consumer:
      auto-offset-reset: earliest
  data:
    redis:
      connect-timeout: 2s
      timeout: 2s
  elasticsearch:
    connection-timeout: 2s
    socket-timeout: 2s
  task:
    scheduling:
      pool:
        size: 1

kafka:
  enabled: true

canal:
  enabled: false

llm:
  enabled: false

rag:
  enabled: false

bangumi:
  enabled: false
  sync:
    enabled: false

counter:
  rebuild:
    enabled: false

storage:
  type: local

management:
  health:
    elasticsearch:
      enabled: false
