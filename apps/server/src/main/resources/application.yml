# WinNAT 在 Windows 上会保留 7998-8097（含 8080），本地开发默认 8888
server:
  port: ${SERVER_PORT:8888}

kafka:
  enabled: ${KAFKA_ENABLED:false}

seed:
  content-pack-path: ${SEED_CONTENT_PACK_PATH:../../content/seed/content-v3}
  cli-read-only: ${SEED_CLI_READ_ONLY:false}

search:
  content-base-url: ${SEARCH_CONTENT_BASE_URL:http://localhost:${SERVER_PORT:8888}}

spring:
  config:
    import: optional:classpath:agent-domain.yml
  application:
    name: chtholly-server
  mvc:
    throw-exception-if-no-handler-found: true
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.elasticsearch.autoconfigure.ElasticsearchVectorStoreAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.deepseek.autoconfigure.DeepSeekChatAutoConfiguration
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:chtholly}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1700000
      keepalive-time: 300000
      connection-timeout: 30000
  jackson:
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    admin:
      auto-create: true
    template:
      default-topic: counter-events
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      linger: 10ms
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: counter-agg
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false
    listener:
      type: single
      ack-mode: manual
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.8
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${DASHSCOPE_API_KEY:}
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1536
    vectorstore:
      elasticsearch:
        initialize-schema: true
        index-name: chtholly-ai-index
        dimensions: 1536
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    replicas: ${ES_REPLICAS:0}

canal:
  enabled: ${CANAL_ENABLED:false}
  host: localhost
  port: 11111
  destination: example
  username: "canal"
  password: ${CANAL_PASSWORD:Canal@123456}
  filter: chtholly\.outbox
  batchSize: 1000
  intervalMs: 1000

site:
  owner-user-id: ${SITE_OWNER_USER_ID:1}
  chtholly-user-id: ${CHTHOLLY_USER_ID:888888888888888888}
  owner-bootstrap-password: ${OWNER_BOOTSTRAP_PASSWORD:}
  owner-handle: ${OWNER_HANDLE:Rekyrice}
  owner-nickname: ${OWNER_NICKNAME:Rekyrice}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

cleanup:
  login-logs:
    retention-days: ${CLEANUP_LOGIN_LOGS_DAYS:90}
  outbox:
    retention-days: ${CLEANUP_OUTBOX_DAYS:7}
  notifications:
    retention-days: ${CLEANUP_NOTIFICATIONS_DAYS:90}
  bangumi-sync-log:
    retention-days: ${CLEANUP_BANGUMI_SYNC_LOG_DAYS:30}
  dead-letter:
    retention-days: ${CLEANUP_DEAD_LETTER_DAYS:30}
  feed-pages:
    max-size: ${CLEANUP_FEED_PAGES_MAX:1000}

rag:
  enabled: ${LLM_ENABLED:false}

llm:
  enabled: ${LLM_ENABLED:false}

agent:
  model: ${AGENT_MODEL:deepseek-chat}
  llm-timeout-seconds: ${AGENT_LLM_TIMEOUT_SECONDS:30}
  max-response-chars: ${AGENT_MAX_RESPONSE_CHARS:2000}
  max-steps: ${AGENT_MAX_STEPS:5}
  memory-max-turns: ${AGENT_MEMORY_MAX_TURNS:20}
  memory-ttl-minutes: ${AGENT_MEMORY_TTL_MINUTES:120}
  stream-char-delay-ms: ${AGENT_STREAM_CHAR_DELAY_MS:50}
  tool-timeout-seconds: ${AGENT_TOOL_TIMEOUT_SECONDS:30}
  skills:
    page-explain:
      enabled: ${AGENT_SKILL_PAGE_EXPLAIN_ENABLED:true}
    evidence-outline:
      enabled: ${AGENT_SKILL_EVIDENCE_OUTLINE_ENABLED:true}
    draft-fact-check:
      enabled: ${AGENT_SKILL_DRAFT_FACT_CHECK_ENABLED:true}

bangumi:
  enabled: ${BANGUMI_ENABLED:true}
  base-url: https://api.bgm.tv
  access-token: ${BANGUMI_ACCESS_TOKEN:}
  http-proxy: ${BANGUMI_HTTP_PROXY:}
  use-system-proxy: ${BANGUMI_USE_SYSTEM_PROXY:true}
  user-agent: ChthollyHub/1.0 (https://github.com/chtholly-hub)
  rate-per-second: 1
  sync:
    enabled: ${BANGUMI_SYNC_ENABLED:false}
    cron: "0 0 4 * * *"

counter:
  calibration:
    enabled: ${COUNTER_CALIBRATION_ENABLED:true}
    fixed-delay: ${COUNTER_CALIBRATION_FIXED_DELAY:PT5M}
    batch-size: ${COUNTER_CALIBRATION_BATCH_SIZE:50}
    scan-count: ${COUNTER_CALIBRATION_SCAN_COUNT:500}
  kafka:
    publish:
      max-attempts: ${COUNTER_KAFKA_PUBLISH_MAX_ATTEMPTS:3}
      ack-timeout: ${COUNTER_KAFKA_PUBLISH_ACK_TIMEOUT:PT3S}
    consumer:
      max-attempts: ${COUNTER_KAFKA_CONSUMER_MAX_ATTEMPTS:3}
      retry-backoff: ${COUNTER_KAFKA_CONSUMER_RETRY_BACKOFF:PT1S}
      dlt-ack-timeout: ${COUNTER_KAFKA_CONSUMER_DLT_ACK_TIMEOUT:PT3S}
  rebuild:
    enabled: false
    lock:
      watchdog-ms: 30000

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

comment:
  rate-limit-per-minute: 5
  sensitive-words: []

auth:
  jwt:
    issuer: chtholly
    key-id: chtholly-key
    private-key: classpath:keys/private.pem
    public-key: classpath:keys/public.pem
    access-token-ttl: PT15M
    refresh-token-ttl: P7D
  verification:
    code-length: 6
    ttl: PT5M
    max-attempts: 5
    send-interval: PT60S
    daily-limit: 10
  password:
    bcrypt-strength: 12
    min-length: 8

management:
  endpoint:
    health:
      show-details: when-authorized
  health:
    elasticsearch:
      enabled: true
  observations:
    key-values:
      service.name: chtholly-agent
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}

logging:
  level:
    root: INFO
    '[com.chtholly]': DEBUG

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
    path: /api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

oss:
  endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket: ${OSS_BUCKET:}
  public-domain: ${OSS_PUBLIC_DOMAIN:}
  folder: ${OSS_FOLDER:post}

storage:
  type: ${STORAGE_TYPE:local}
  local:
    base-path: ${STORAGE_LOCAL_PATH:./uploads}
    public-url-prefix: /uploads

cache:
  read-mode: ${CACHE_READ_MODE:full}
  l2:
    public-cfg:
      ttl-seconds: 15
      max-size: 1000
    mine-cfg:
      ttl-seconds: 10
      max-size: 1000
  hotkey:
    window-seconds: 60
    segment-seconds: 10
    level-low: 50
    level-medium: 200
    level-high: 500
    extend-low-seconds: 20
    extend-medium-seconds: 60
    extend-high-seconds: 120

feed:
  bigv:
    threshold: 1000
  timeline:
    retention-days: 30
    bigv-pull-hours: 24
    bigv-cache-seconds: 300
